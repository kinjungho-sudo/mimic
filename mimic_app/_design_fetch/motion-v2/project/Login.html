<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>로그인 — MIMIC</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link rel="stylesheet" href="app.css?v=3" />
<link rel="stylesheet" href="auth.css?v=3" />
</head>
<body data-screen-label="02 Login">

<div class="auth">

  <!-- ───── Left brand panel ───── -->
  <aside class="auth__brand">
    <div class="auth__brand-inner">
      <a href="Landing.html" class="auth-brand-mark">
        <span class="auth-brand-mark__square">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.2" y="5.2" width="11" height="2.4" rx="1.2" fill="white" fill-opacity="0.5"/><rect x="3.2" y="10.8" width="14" height="2.4" rx="1.2" fill="white"/><rect x="3.2" y="16.4" width="8" height="2.4" rx="1.2" fill="white" fill-opacity="0.5"/><circle cx="18.7" cy="17.6" r="3.6" fill="white"/><path d="M17.6 16.1 L20.1 17.6 L17.6 19.1 Z" fill="#4F46E5"/></svg>
        </span>
        MIMIC
      </a>

      <div class="auth__hero">
        <h1>다시 오신 걸 환영해요</h1>
        <p>매뉴얼은 만들어두고, 잊고 있던 사이에도 사람들은 따라하고 있습니다.</p>

        <div class="auth__points">
          <div class="auth__point">
            <span class="auth__point-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </span>
            <div>
              <strong>30초 만에 매뉴얼 제작</strong>
              <span>Chrome 확장으로 평소처럼 일하면 끝.</span>
            </div>
          </div>
          <div class="auth__point">
            <span class="auth__point-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
            </span>
            <div>
              <strong>3가지 형태로 자동 변환</strong>
              <span>가이드 문서 · 인터랙티브 튜토리얼 · 영상.</span>
            </div>
          </div>
          <div class="auth__point">
            <span class="auth__point-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </span>
            <div>
              <strong>링크 한 줄로 공유</strong>
              <span>슬랙·카톡·이메일 어디에든 붙여넣기.</span>
            </div>
          </div>
        </div>
      </div>

      <div class="auth__footer">© 2026 코마인드웍스</div>
    </div>
  </aside>

  <!-- ───── Right form panel ───── -->
  <section class="auth__form">
    <div class="auth__form-top">
      계정이 없으신가요?<a href="Signup.html">회원가입</a>
    </div>

    <div class="auth__form-inner">
      <h2>로그인</h2>
      <p class="sub">Google 계정으로 접속하여 회원 가입없이 시작하세요.</p>

      <button class="auth__google" type="button">
        <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.71v2.26h2.9c1.69-1.56 2.69-3.85 2.69-6.62z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.46-.8 5.95-2.18l-2.9-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.59-5.04-3.71H.96v2.33A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.96 10.71c-.18-.54-.28-1.12-.28-1.71s.1-1.17.28-1.71V4.96H.96A8.996 8.996 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3-2.33z" fill="#FBBC05"/>
          <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l3 2.33C4.67 5.17 6.66 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 로그인
      </button>

      <div class="auth__divider">또는 이메일로</div>

      <div class="auth__field">
        <label class="label">이메일</label>
        <input class="input" type="email" placeholder="name@company.com" value="jungho@comindworks.com" />
      </div>

      <div class="auth__field">
        <div class="auth__field-row">
          <label class="label" style="margin:0;">비밀번호</label>
          <a href="#">비밀번호를 잊으셨나요?</a>
        </div>
        <input class="input" type="password" placeholder="비밀번호" value="••••••••••" />
      </div>

      <label class="auth__keep">
        <span class="check">
          <input type="checkbox" checked>
          <span class="check__box"></span>
        </span>
        로그인 상태 유지
      </label>

      <button class="auth__submit" type="submit">로그인</button>

      <div class="auth__bottom-help">
        <span class="auth__bottom-help-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        Chrome 확장 사용자도 여기서 로그인하세요.
      </div>
    </div>
  </section>

</div>

</body>
</html>
