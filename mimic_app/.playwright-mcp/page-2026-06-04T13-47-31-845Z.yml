                        - text: 묵은지 컨셉이라고 해서 기대했는데, 실제로는 존재감이 거의 느껴지지 않았습니다. 휘저어보다가 작은 조각이 보이는 정도였습니다.
                        - text: 국물 맛도 일정하지 않았습니다. 어떤 건 싱겁고, 어떤 건 조미료 맛이 강하게 느껴질 정도였습니다.
                        - text: 닭고기는 껍데기 식감은 나쁘지 않았지만, 전체적인 맛은 평범 이하 느낌이었습니다.
