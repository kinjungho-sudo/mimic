                        - text: • 양이 많지 않아 가족끼리 먹기엔 부족
                        - text: • 매운맛이 살짝 있어서 맵찔이들은 조심!!!
                        - text: • 직접 재료 사서 만들 때보다 가격은 조금 높음
                        - text: ▪️평가
