                        - text: "✔️제품명 : 건강한끼 묵은지 순살 닭볶음탕 500g + 조리 냄비 세트"
                        - text: ✔️구성
                        - text: 바로 불 위에 올려서 끓일수 있는 전용 일회용 냄비와, 따로 손질이 필요없는 묵은지와 닭고기가 양념과 함께 한 팩에 담겨있습니다!
                        - text: ✔️조리 과정
                        - text: 조리 방법은 매우 간단했습니다 냉동 그대로 끓여도 되지만 저는 살짝 해동 한 후 전용냄비에 몽땅넣고 끓였습니다 별도의 손질이나 양념이 필요 없어 바쁜 날에도 부담 없이 조리할 수 있었습니다
                        - text: 저는 더 맛있게 먹기위해 간마늘과 대파, 떡도 추가하여 끓여 먹었고 개인적으로 더 새콤한 묵은지를 좋아하여 식초를 소량 추가하여 먹었더니 더 맛이 좋아졌습니다 또 닭고기에 잡내또한 없었습니다ㅎㅎ
                        - text: ✔️맛
                        - text: 닭고기는 전부 순살이라 뼈 발라낼 필요 없이 먹기 편했고, 잡내도 없어서 좋았습니다 물은 묵은지 특유의 칼칼하면서도 시원한 맛이 잘 배어 있어 밥과 함께 먹기 딱 좋았습니다.
                        - text: 기름지지 않고 깔끔한 국물이 특징이라 남녀노소 누구나 즐길 수 있을 것 같습니다. 저는 별도로 떡을 추가하여 끓여먹었는데 물을 조금 더 넣어주고 푹 끓여줬더니 두꺼운 떡에도 간이 잘 스며들어 더욱 맛있고 풍성하게 즐길 수 있었습니다 라면사리나 당면사리를 추가해도 잘 어울릴 것 같습니다.
                        - text: ✔️장점
