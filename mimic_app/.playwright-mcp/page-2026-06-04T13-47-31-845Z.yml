                        - text: 퇴근하고 배고플 때 10분만에 완성되니까 라면보다 간단쓰...!
                        - text: 반찬 따로 안 차려도 되고, 그냥 이거 하나에 밥만 있으면 끝이라 정말 간편했어요. 닭도 냄새 안 나고 깔끔하고 양이 적당해서 남지도 않았습니다 쌈싸먹으니 마싯더라구요 ㅎㅎ
