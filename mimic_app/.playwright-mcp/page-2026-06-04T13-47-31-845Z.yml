                        - text: 캠핑가실분들은 전날 배송시켜서 그대로 냉장고에 보관했다가 가지고 나가시면 될 것 같아요.
                        - text: 비닐을 뜯어서 은박 냄비에 붓고 그대로 끓이기만 하면 끝입니다.
                        - text: 설명에 마늘이나 파를 넣으면 좋다고 되어 있기에,
                        - text: 저는 잘라서 냉동해둔 파를 더 추가 하였습니다.
                        - text: 닭이 완전히 익는데 생각보다 긴 시간이 걸렸고요,
                        - text: 그러다보니 국물이 좀 졸아서 먹게 되는 것 같아요.
                        - text: 그 사이 양념이 고기에 베어들어 맛있습니다.
                        - text: 다만, 김치가 묵은지 까지는 아니고 조금 신김치 같이 느껴지네요.
                        - text: 전체적으로 대단히 맛있지는 않지만..
                        - text: 캠핑가서 고기만 구을수는 없고, 간단한 요리를 해먹고 싶을 때
                        - text: 더 좋은 선택지가 없을 것 같아요.
                        - text: 추천합니다!!
