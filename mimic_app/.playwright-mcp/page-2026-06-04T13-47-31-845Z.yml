                      - generic [ref=e3509]:
                        - text: 쿠팡체험단 이벤트로 상품을 무료 제공받아 작성한 리뷰입니다.
                        - text: 정말 오랜만에 닭볶음탕을 주문했어요. 밖에서 사 먹는 건 왠지 모르게 자극적이고, 집에서 직접 해 먹자니 손이 많이 가서 늘 고민만 하다가 말았거든요. 그런데 이번에 '건강한 한끼 묵은지 순살 닭볶음탕'이라는 제품을 발견하고는, 이름부터 뭔가 솔깃해서 바로 주문해봤습니다.
                        - text: 솔직히 배송이 오고 나서도 큰 기대는 하지 않았어요. '냉동식품이 얼마나 맛있겠어?' 하는 마음이 있었는데 포장을 뜯고 조리를 시작하면서부터 생각이 달라졌어요.
                        - text: 일단 포장이 깔끔하고, 내용물이 정갈하게 들어 있어서 좋았습니다. 따로 재료를 손질할 필요 없이 냄비 그대로 끓이기만 하면 되는데 저는 집에서 먹는거라 냄비에 따로 옮겨담아 조리했습니다.
                        - text: 가장 놀라웠던 점은 바로 재료였어요. '순살'이라고 해서 퍽퍽한 살만 있을 줄 알았는데, 부드럽고 쫄깃한 다리살 위주로 들어 있어서 식감이 정말 좋았습니다. 닭고기 자체도 신선하고 잡내가 전혀 없었어요. 그리고 이 제품의 핵심이라고 할 수 있는 묵은지는, 적당히 시큼하면서도 깊은 맛이 우러나와서 닭볶음탕의 맛을 한층 더 끌어올려 주었습니다. 흔히 닭볶음탕에 묵은지를 넣는다고 하면 잘 안 어울릴 것 같다고 생각할 수 있는데, 닭볶음탕의 칼칼한 양념과 묵은지의 시원하고 개운한 맛이 절묘하게 어우러져서 아주 새로운 맛을 만들어냈어요.
                        - text: 양념도 인상적이었습니다. 밖에서 사 먹는 닭볶음탕은 보통 맵기만 하고 조미료 맛이 강한 경우가 많은데, 이 제품은 인위적인 맛보다는 고춧가루와 채소에서 우러나온 듯한 깔끔한 매운맛이 주를 이뤘습니다. 맵찔이인 저도 맛있게 먹을 수 있을 정도의 기분 좋은 매콤함이었어요. 국물은 자박자박하면서도 진한 맛이 일품이라 밥을 비벼 먹기에 딱 좋았습니다.
                        - text: "'건강한 한끼'라는 이름에 걸맞게, 야채들도 넉넉하게 들어있었어요"
                        - text: 보통 냉동식품으로 나오는 것들은 야채를 추가해주어야 하는데 굳이 그럴 필요 없도록 많이 들어있었습니다 . 밥과 함께 먹으니 정말 든든하고 만족스러운 식사가 되었습니다.
                        - text: 자작한 국물에 밥 비벼먹으니 세상 든든한 한끼가 되었어요.
                        - text: ❣️ 바쁜 일상 속에서 건강하고 맛있는 한 끼를 챙기고 싶은 분들에게 강력히 추천하고 싶은 제품입니다. 냉동식품에 대한 편견을 완전히 깨 준 제품이에요. 다음번에는 두 개쯤 쟁여두고 먹어야겠다고 생각했습니다.
