                        - text: 퇴근 후 녹초가 되어서 아무것도 하기 싫은데 밥은 해야하고 배달시켜 먹자니 요즘같은 불경기에 부담이 될때 쟁여놓고 먹기 딱 좋은 제품같습니다.
                        - text: 따로 준비할 것 전혀없이 손질도 필요없이 손쉽게 조리할 수 있으면서도 묵은지와 닭의 조합이 잘 어울려 맛도 훌륭하여 집밥 같은 든든함을 느낄 수 있었고, 냄비까지 함께 제공되어 저같은 귀차니즘에게 활용도 또한 높았습니다.
