                        - text: 500g씩 소포장이라 냉동실에 넣어두고 필요할 때 꺼내 쓰기 편리할거같아요 냉동 체고체고-!
                        - text: 유통기한도 넉넉해서 쟁여두기 좋습니다. 전용 냄비는 생각보다 튼튼하고, 사이즈가 작아서 1~2인 요리에 딱 맞아요
                        - text: 캠핑할때 가지고가면 넘 좋겠다 생각들더라구요 ㅎㅎㅎ
