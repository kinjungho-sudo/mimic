<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>마이크 권한 요청 — MIMIC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #1e1e2e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px; padding: 24px; text-align: center;
    }
    .icon { font-size: 40px; }
    .title { font-size: 16px; font-weight: 700; }
    .desc { font-size: 13px; color: #666; line-height: 1.6; max-width: 380px; }
    .desc strong { color: #4F46E5; }
    .ok { color: #15803D; }
    .err { color: #B91C1C; }
    .hint {
      font-size: 12px; color: #555; background: #F5F3FF;
      border: 1px solid #DDD6FE; border-radius: 10px;
      padding: 12px 14px; line-height: 1.7; max-width: 380px; text-align: left;
      display: none;
    }
    .hint.show { display: block; }
    button {
      margin-top: 4px; padding: 9px 20px;
      background: #4F46E5; color: #fff; border: none; border-radius: 9px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #4338CA; }
  </style>
</head>
<body>
  <div class="icon" id="icon">🎙️</div>
  <div class="title" id="title">마이크 권한을 요청하는 중…</div>
  <div class="desc" id="desc">브라우저 상단에 뜨는 <strong>마이크 허용</strong> 창에서 “허용”을 눌러주세요.</div>
  <div class="hint" id="hint"></div>
  <button id="retryBtn" style="display:none">다시 시도</button>
  <script src="request-mic.js"></script>
</body>
</html>
